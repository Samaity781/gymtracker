{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Log In – GymTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h2 class="h4 mb-4 text-center"><i class="bi bi-lock me-2"></i>Log In</h2>
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">Log in</button>
          </div>
        </form>
        <hr>
        <p class="text-center small mb-1">
          <a href="{% url 'accounts:password_reset' %}">Forgot your password?</a>
        </p>
        <p class="text-center small mb-0">
          New here? <a href="{% url 'accounts:register' %}">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
