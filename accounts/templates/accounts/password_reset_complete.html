{% extends "base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <i class="bi bi-check-circle display-3 text-success"></i>
    <h2 class="mt-3">Password updated</h2>
    <p class="text-muted">Your password has been changed. You can now log in with your new credentials.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-2">Log in</a>
  </div>
</div>
{% endblock %}
