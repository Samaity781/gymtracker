{% extends "base.html" %}
{% block title %}Reset Email Sent{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <i class="bi bi-envelope-check display-3 text-success"></i>
    <h2 class="mt-3">Check your email</h2>
    <p class="text-muted">If that address is registered, a reset link has been sent (check your console in development mode).</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary mt-2">Back to Login</a>
  </div>
</div>
{% endblock %}
