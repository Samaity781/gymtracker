{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Equipment – GymTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header"><strong>{{ action }} Equipment{% if equipment %}: {{ equipment.name }}{% endif %}</strong></div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{% url 'gym:admin_equipment_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
