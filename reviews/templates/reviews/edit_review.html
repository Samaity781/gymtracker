{% extends "base.html" %}
{% block title %}Edit Review – GymTracker{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header">
        <strong><i class="bi bi-pencil me-2"></i>Edit Your Review</strong>
      </div>
      <div class="card-body">
        <div class="alert alert-info small mb-3">
          <i class="bi bi-info-circle me-1"></i>
          You can only edit reviews that are still pending moderation.
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Rating</label>
            <div class="d-flex gap-3">
              {% for i in "12345" %}
              <div class="form-check">
                <input class="form-check-input" type="radio" name="rating" value="{{ i }}"
                       id="star{{ i }}"
                       {% if review.rating == i|add:"0" %}checked{% endif %}>
                <label class="form-check-label" for="star{{ i }}">{{ i }}★</label>
              </div>
              {% endfor %}
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Comment</label>
            <textarea name="comment" class="form-control" rows="4"
                      maxlength="1000">{{ review.comment }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Update review
            </button>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
