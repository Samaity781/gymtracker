{% extends "base.html" %}
{% block title %}Delete Routine{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 text-center">
    <i class="bi bi-trash display-4 text-danger"></i>
    <h4 class="mt-3">Delete "{{ routine.name }}"?</h4>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center mt-3">
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'tracker:routine_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
